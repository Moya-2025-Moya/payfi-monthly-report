name: Cron Triggers

concurrency:
  group: cron-triggers-production
  cancel-in-progress: false

on:
  workflow_dispatch:
    inputs:
      endpoint:
        description: 'Endpoint to trigger (e.g. /api/cron/collect). Leave empty to run the full daily chain (collect → process).'
        required: false

jobs:
  trigger:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Trigger cron endpoints
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          BASE_URL: https://payfi-monthly-report.vercel.app
          MANUAL_ENDPOINT: ${{ github.event.inputs.endpoint }}
        run: |
          set -euo pipefail

          call() {
            local path="$1"
            echo "→ Triggering $path ..."
            RESPONSE=$(curl -s -w "\n%{http_code}" \
              -H "Authorization: Bearer $CRON_SECRET" \
              --max-time 600 \
              "$BASE_URL$path")
            local http_status
            http_status=$(echo "$RESPONSE" | tail -1)
            BODY=$(echo "$RESPONSE" | sed '$d')
            echo "  Status: $http_status"
            echo "  Body:   $BODY"
            if [ "$http_status" != "200" ]; then
              echo "::error::$path returned HTTP $http_status"
              exit 1
            fi
          }

          # Manual trigger with specific endpoint
          if [ -n "$MANUAL_ENDPOINT" ]; then
            call "$MANUAL_ENDPOINT"
            exit 0
          fi

          # Manual trigger without endpoint defaults to the full daily chain
          echo "Manual run — executing full daily chain"
          call "/api/cron/collect"
          call "/api/cron/process"
          call "/api/cron/daily-push"
          echo "Done."
