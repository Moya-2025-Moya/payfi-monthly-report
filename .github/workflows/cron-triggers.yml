name: Cron Triggers

on:
  schedule:
    - cron: '0 0 * * *'   # UTC 00:00 daily  → collect
    - cron: '0 1 * * *'   # UTC 01:00 daily  → process, twitter(Sun), snapshot(Mon)
    - cron: '0 2 * * *'   # UTC 02:00 daily  → daily-news
    - cron: '0 5 * * 0'   # UTC 05:00 Sunday → knowledge
  workflow_dispatch:
    inputs:
      endpoint:
        description: 'Endpoint to trigger (e.g. /api/cron/daily-news), leave empty to auto-detect'
        required: false

jobs:
  trigger:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Trigger cron endpoints
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          BASE_URL: https://payfi-monthly-report.vercel.app
          MANUAL_ENDPOINT: ${{ github.event.inputs.endpoint }}
        run: |
          call() {
            local path="$1"
            echo "→ Triggering $path ..."
            RESPONSE=$(curl -s -w "\n%{http_code}" \
              -H "Authorization: Bearer $CRON_SECRET" \
              --max-time 120 \
              "$BASE_URL$path")
            STATUS=$(echo "$RESPONSE" | tail -1)
            BODY=$(echo "$RESPONSE" | sed '$d')
            echo "  Status: $STATUS"
            echo "  Body:   $BODY"
            if [ "$STATUS" != "200" ]; then
              echo "::error::$path returned HTTP $STATUS"
              exit 1
            fi
          }

          # Manual trigger with specific endpoint
          if [ -n "$MANUAL_ENDPOINT" ]; then
            call "$MANUAL_ENDPOINT"
            exit 0
          fi

          # Auto-detect based on current UTC time
          HOUR=$(date -u +%-H)
          DOW=$(date -u +%u)  # 1=Mon … 7=Sun

          echo "UTC hour=$HOUR, day=$DOW"

          # UTC 00:00 (Beijing 08:00) — collect data
          if [ "$HOUR" = "0" ]; then
            call "/api/cron/collect"
            [ "$DOW" = "7" ] && call "/api/cron/twitter"
          fi

          # UTC 01:00 (Beijing 09:00) — process collected data
          if [ "$HOUR" = "1" ]; then
            call "/api/cron/process"
            [ "$DOW" = "1" ] && call "/api/cron/snapshot"
          fi

          # UTC 02:00 (Beijing 10:00) — send daily news digest
          if [ "$HOUR" = "2" ]; then
            call "/api/cron/daily-news"
          fi

          # UTC 05:00 Sunday (Beijing 13:00) — knowledge engine
          if [ "$HOUR" = "5" ] && [ "$DOW" = "7" ]; then
            call "/api/cron/knowledge"
          fi

          echo "Done."
